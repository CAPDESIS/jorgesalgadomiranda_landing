name: gitleaks
on:
  workflow_dispatch:

  schedule:
    # Local-first policy: PR/push validation runs on the developer machine.
    # Remote CI is manual or staggered daily to avoid runner bottlenecks.
    - cron: '30 11 * * *'
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, public-only, ci-runner-node, test-light]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.0"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          wget -q "${BASE_URL}/${TARBALL}"
          wget -q "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          sha256sum --ignore-missing --check "gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          tar xzf "${TARBALL}" gitleaks
          chmod +x gitleaks
          rm "${TARBALL}" "gitleaks_${GITLEAKS_VERSION}_checksums.txt"
      - name: Run gitleaks
        run: ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --report-format sarif --report-path gitleaks.sarif --exit-code 1
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
