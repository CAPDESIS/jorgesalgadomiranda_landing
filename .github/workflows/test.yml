name: test

on:
  pull_request:
    branches: [main]
    paths:
      - "assets/js/**"
      - "assets/i18n.js"
      - "tests/**"
      - "index.html"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - ".github/workflows/test.yml"

  workflow_dispatch:

  schedule:
    # Local-first policy: PR validation runs on the developer machine too.
    # Remote CI also runs daily so coverage regressions do not sit
    # undetected between PRs, matching gitleaks.yml/release-policy.yml.
    - cron: '30 11 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun-test:
    name: bun test --coverage (>= 85% lines)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, public-only, ci-runner-node, test-light]
    steps:
      - uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Fail if any em-dash/en-dash slipped into JS or tests
        run: |
          set -euo pipefail
          python3 -c "
          import pathlib, sys
          bad = []
          for base in ('assets/js', 'tests'):
              for path in pathlib.Path(base).rglob('*'):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  if '\u2013' in text or '\u2014' in text:
                      bad.append(str(path))
          if bad:
              print('::error::em-dash or en-dash found (workspace style rule): ' + ', '.join(bad))
              sys.exit(1)
          print('No em-dash/en-dash found.')
          "
