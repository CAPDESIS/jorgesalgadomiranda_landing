name: test

on:
  # Local-first policy: the full suite is dispatched/scheduled on trusted
  # self-hosted capacity; production deploy remains a separate gated workflow.
  workflow_dispatch:

  schedule:
    # Local-first policy: run the full suite manually before merge. Remote CI
    # remains a daily drift/coverage guard.
    - cron: '30 11 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun-test:
    name: bun test --coverage (>= 85% lines)
    runs-on: [self-hosted, ci-runner-node, test-light]
    steps:
      - name: Validate self-hosted runner
        run: |
          if [ "${{ runner.environment }}" != "self-hosted" ]; then
            echo "::error::Landing test suite must run on a self-hosted runner"
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Contact API contract tests (Resend mock)
        run: bun run test:contact

      - name: Guard against Zyro CDN and missing local assets
        run: bun run check:assets

      - name: Fail if any em-dash/en-dash slipped into JS or tests
        run: |
          set -euo pipefail
          python3 -c "
          import pathlib, sys
          bad = []
          for base in ('assets/js', 'tests'):
              for path in pathlib.Path(base).rglob('*'):
                  if not path.is_file():
                      continue
                  text = path.read_text(encoding='utf-8', errors='ignore')
                  if '\u2013' in text or '\u2014' in text:
                      bad.append(str(path))
          if bad:
              print('::error::em-dash or en-dash found (workspace style rule): ' + ', '.join(bad))
              sys.exit(1)
          print('No em-dash/en-dash found.')
          "
