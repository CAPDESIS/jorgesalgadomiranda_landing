name: Deploy to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - ".htaccess"
      - "404.html"
      - "assets/**"
      - "cv/**"
      - "fonts/**"
      - "humans.txt"
      - "index.html"
      - "legal/**"
      - "og.png"
      - "robots.txt"
      - "sitemap.xml"
  schedule:
    # Static production refresh after daily validation windows.
    - cron: "40 13 * * *"
  # Manual production promotion keeps explicit release gate confirmations.
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'Exact staging-validated commit SHA to deploy.'
        required: true
        default: ''
      confirm_staging_green:
        description: 'Type yes to confirm staging health/smoke/load passed.'
        required: true
        default: 'no'
      confirm_no_p0_p1_alerts:
        description: 'Type yes to confirm central monitoring has no open P0/P1 alerts.'
        required: true
        default: 'no'
      confirm_backup_ready:
        description: 'Type yes if backup is current, or n/a if this release does not touch data.'
        required: true
        default: 'n/a'
      emergency_override:
        description: 'Set true only for explicitly approved emergency deploys outside Monday.'
        required: false
        default: 'false'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # Force third-party JS actions onto Node 24 before the June 2026 cutoff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: FTP upload
    runs-on: [self-hosted, public-only, ci-runner-node, deploy-only]
    environment: production
    steps:
      - name: Resolve release context
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_sha="$INPUT_RELEASE_SHA"
            manual_gate="true"
          else
            release_sha="$GITHUB_SHA_VALUE"
            manual_gate="false"
          fi
          if [ "${#release_sha}" -ne 40 ] || ! printf '%s' "$release_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_sha must be a 40-character commit SHA."
            exit 1
          fi
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "manual_gate=$manual_gate" >> "$GITHUB_OUTPUT"

      - name: Enforce Monday production window
        run: |
          set -euo pipefail
          if [ "${{ steps.release.outputs.manual_gate }}" != "true" ]; then
            echo "Automated static deploy path; Monday manual window is not required."
            exit 0
          fi
          if [ "${{ inputs.emergency_override }}" = "true" ]; then
            echo "::warning::Emergency override approved; bypassing Monday window."
            exit 0
          fi
          if [ "$(TZ=America/Mexico_City date +%u)" != "1" ]; then
            echo "::error::Production deploys are allowed only on Monday in America/Mexico_City after staging validation."
            exit 1
          fi

      - name: Validate production release gates
        run: |
          set -euo pipefail
          release_sha="${{ steps.release.outputs.release_sha }}"
          if [ "${#release_sha}" -ne 40 ] || ! printf '%s' "$release_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_sha must be the exact 40-character staging-validated commit SHA."
            exit 1
          fi
          if [ "${{ steps.release.outputs.manual_gate }}" != "true" ]; then
            echo "Automated static deploy from main uses github.sha=$release_sha and post-deploy smoke gates."
            exit 0
          fi
          if [ "${{ inputs.confirm_staging_green }}" != "yes" ]; then
            echo "::error::confirm_staging_green=yes is required."
            exit 1
          fi
          if [ "${{ inputs.confirm_no_p0_p1_alerts }}" != "yes" ]; then
            echo "::error::confirm_no_p0_p1_alerts=yes is required."
            exit 1
          fi
          case "${{ inputs.confirm_backup_ready }}" in
            yes|n/a) ;;
            *) echo "::error::confirm_backup_ready must be yes or n/a."; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.release_sha }}

      - name: Sanitize FTP host
        id: host
        env:
          RAW_HOST: ${{ secrets.FTP_HOST }}
        run: |
          set -e
          if [ -z "$RAW_HOST" ]; then
            echo "::error::FTP_HOST secret is empty. Set it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          # Strip whitespace/newlines/CR, any scheme (ftp://, ftps://, sftp://), and any trailing path.
          CLEAN=$(printf '%s' "$RAW_HOST" | tr -d '[:space:]\r' | sed -E 's#^[a-zA-Z]+://##' | sed 's#/.*##')
          echo "::add-mask::$CLEAN"
          echo "host=$CLEAN" >> "$GITHUB_OUTPUT"
          if [ "$CLEAN" != "$RAW_HOST" ]; then
            echo "::warning::FTP_HOST had extra characters (whitespace, scheme, or path). Sanitized before use."
          fi

      - name: Pre-flight check (hostname/IP resolves)
        env:
          HOST: ${{ steps.host.outputs.host }}
        run: |
          python3 - <<'PY'
          import os, socket, sys
          host = os.environ.get('HOST', '')
          if not host:
              print('::error::Sanitized FTP host is empty.', file=sys.stderr)
              sys.exit(1)
          try:
              ip = socket.gethostbyname(host)
              print('DNS/IP OK')
          except Exception as e:
              print(f'::error::FTP host could not be resolved. Check hPanel > Files > FTP Accounts. Error: {type(e).__name__}', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Cache-bust asset URLs
        env:
          SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -e
          # Append the commit SHA as a version query to the stylesheet and
          # extracted-i18n script so Cloudflare, Hostinger, and browsers all
          # see a new URL on every deploy. Without this the 7-day text/css
          # Expires header can pin an old stylesheet at the CF edge while the
          # HTML has already changed, producing unstyled markup on the live
          # site. The edit is applied to the working tree only, never
          # committed back to the repo.
          V="${SHA:0:7}"
          sed -i -E "s#href=\"assets/styles\.css\"#href=\"assets/styles.css?v=${V}\"#g" index.html
          sed -i -E "s#src=\"assets/i18n\.js\"#src=\"assets/i18n.js?v=${V}\"#g" index.html
          # Extracted JS modules under assets/js/ (email validation, consent,
          # cookie banner, i18n helpers, welcome modal) need the same
          # cache-busting as styles.css/i18n.js above.
          for f in consent i18n-utils welcome-modal email-validation cookie-banner; do
            sed -i -E "s#src=\"assets/js/${f}\.js\"#src=\"assets/js/${f}.js?v=${V}\"#g" index.html
          done
          echo "Asset version: ${V}"
          grep -E "assets/(styles\.css|i18n\.js)" index.html || (echo "::error::cache-bust rewrite missed expected references" && exit 1)
          grep -cE "assets/js/[a-z0-9-]+\.js\?v=${V}" index.html | grep -q '^5$' || (echo "::error::cache-bust rewrite missed one of the assets/js/*.js references" && exit 1)

      - name: Inject production tokens (optional, skip silently if secret missing)
        env:
          UMAMI_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          CF_BEACON: ${{ secrets.CF_BEACON_TOKEN }}
          WEB3FORMS: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
        run: |
          set -e
          # Replace the YOUR_* placeholders at deploy time so the committed
          # HTML stays free of real tokens. Each substitution runs only when
          # the corresponding secret is configured in the repo, so partial
          # setups do not fail the build.
          INJECTED=""
          if [ -n "$UMAMI_ID" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_UMAMI_WEBSITE_ID', os.environ['UMAMI_ID']))"
            INJECTED="$INJECTED UMAMI_WEBSITE_ID"
          fi
          if [ -n "$CF_BEACON" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_CF_BEACON_TOKEN', os.environ['CF_BEACON']))"
            INJECTED="$INJECTED CF_BEACON_TOKEN"
          fi
          if [ -n "$WEB3FORMS" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_WEB3FORMS_ACCESS_KEY', os.environ['WEB3FORMS']))"
            INJECTED="$INJECTED WEB3FORMS_ACCESS_KEY"
          fi
          if [ -n "$POSTHOG_KEY" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_POSTHOG_KEY', os.environ['POSTHOG_KEY']))"
            INJECTED="$INJECTED PUBLIC_POSTHOG_KEY"
          fi
          if [ -z "$INJECTED" ]; then
            echo "No optional tokens configured. Landing will keep placeholders and Umami/CF/Web3Forms/PostHog init will skip at runtime."
          else
            echo "Injected:$INJECTED"
          fi

      - name: Assert contact form access key is live
        env:
          WEB3FORMS: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          set -euo pipefail
          # Guard against the silent dead-form failure mode: if the
          # WEB3FORMS_ACCESS_KEY secret is configured, the access_key input in
          # the HTML that is about to be uploaded MUST no longer carry the
          # YOUR_WEB3FORMS_ACCESS_KEY placeholder. When the placeholder ships,
          # the client-side guard blocks every submission and the primary
          # lead-gen CTA is dead for every visitor with no visible signal.
          #
          # This checks the local index.html, which is the exact byte stream
          # the FTP step uploads as a single atomic batch. We do not fetch the
          # live HTML here because Cloudflare Bot Fight Mode returns 403 to
          # runner IPs (see the smoke-test step), so an origin probe is not a
          # reliable assertion from CI.
          KEY_LINE=$(grep -E 'name="access_key"' index.html || true)
          if [ -z "$KEY_LINE" ]; then
            echo "::error::Could not find the access_key input in index.html; the contact form markup changed."
            exit 1
          fi
          if [ -n "${WEB3FORMS:-}" ]; then
            if printf '%s' "$KEY_LINE" | grep -q 'YOUR_WEB3FORMS_ACCESS_KEY'; then
              echo "::error::WEB3FORMS_ACCESS_KEY secret is set but the access_key input still ships the YOUR_WEB3FORMS_ACCESS_KEY placeholder. The contact form would be dead in production. Check the 'Inject production tokens' step."
              exit 1
            fi
            echo "Contact form access key injected; placeholder is gone."
          else
            echo "::warning::WEB3FORMS_ACCESS_KEY is not configured. The contact form will ship the placeholder, so the client-side guard blocks every submission and shows the visitor a visible error status. Set the secret under Settings > Secrets and variables > Actions, then redeploy."
          fi

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.host.outputs.host }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger FTP users are chrooted to public_html/, so upload at the
          # account root. FTP_REMOTE_DIR is ignored on purpose to avoid double-
          # nesting (previous runs landed files at public_html/public_html/).
          server-dir: ./
          protocol: ftps
          port: 21
          timeout: 60000
          log-level: standard
          # Everything uploads EXCEPT these (dev-only, private, or repo metadata):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.remember/**
            **/.playwright-mcp/**
            **/.idea/**
            **/.vscode/**
            **/node_modules/**
            **/scripts/**
            **/docs/**
            **/tests/**
            **/coverage/**
            **/.env
            **/.env.example
            **/.env.local
            **/.gitignore
            **/.DS_Store
            **/package.json
            **/package-lock.json
            **/bun.lockb
            **/bun.lock
            **/bunfig.toml
            **/README.md
            **/CLAUDE.md
            **/HANDOFF.md
            **/og.html
            **/verify-*.png
            **/*.log

      - name: Post-deploy smoke test
        env:
          SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -e
          # Cloudflare Bot Fight Mode challenges HTML and XML endpoints
          # when the request comes from a GitHub Actions runner. The
          # challenge uses TLS fingerprinting (JA3/JA4), which curl cannot
          # spoof regardless of User-Agent or Accept headers, so asking
          # curl to fetch / or /sitemap.xml reliably returns 403 in CI even
          # though the real site is fine for browsers.
          #
          # Workaround: only probe static assets that Cloudflare does not
          # challenge (text files, versioned CSS and JS, images, fonts).
          # If these land correctly it is safe to assume the accompanying
          # HTML reached the origin too, because the FTP upload is a single
          # atomic batch. Failing this step still catches: missing FTP
          # upload, wrong server-dir nesting, Hostinger origin outage, and
          # CDN that forgot to serve a fresh file.
          V="${SHA:0:7}"
          URLS=(
            "/robots.txt"
            "/humans.txt"
            "/og.png"
            "/assets/styles.css?v=${V}"
            "/assets/i18n.js?v=${V}"
            "/assets/js/consent.js?v=${V}"
            "/assets/js/i18n-utils.js?v=${V}"
            "/assets/js/welcome-modal.js?v=${V}"
            "/assets/js/email-validation.js?v=${V}"
            "/assets/js/cookie-banner.js?v=${V}"
            "/assets/logos/kotlin.svg"
            "/fonts/geist.woff2"
            "/assets/cv/Jorge_Salgado_Miranda_CV_EN.pdf"
          )
          FAILED=0
          for url in "${URLS[@]}"; do
            CODE=""
            for attempt in 1 2 3; do
              CODE=$(curl -sL -o /dev/null -w '%{http_code}' \
                -A "Mozilla/5.0 (compatible; JSMSmokeTest/1.0; +https://jorgesalgadomiranda.com)" \
                "https://jorgesalgadomiranda.com${url}")
              if [ "$CODE" = "200" ]; then
                echo "OK   $url -> $CODE"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "WARN $url -> $CODE on attempt $attempt, retrying in 5s"
                sleep 5
              fi
            done
            if [ "$CODE" != "200" ]; then
              echo "::error::$url returned $CODE after 3 attempts"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Smoke test failed on $FAILED of ${#URLS[@]} URLs"
            exit 1
          fi
          echo "Smoke test: all ${#URLS[@]} URLs returned 200."
          echo "Note: HTML endpoints skipped because CF Bot Fight Mode returns 403 to runner IPs regardless of User-Agent."
