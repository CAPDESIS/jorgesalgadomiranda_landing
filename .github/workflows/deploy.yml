name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 'Exact 40-character commit SHA from main to deploy.'
        required: true
        default: ''
      confirm_release_green:
        description: 'Type yes after local/CI validation for this release SHA.'
        required: true
        default: 'no'
      confirm_no_p0_p1_alerts:
        description: 'Type yes to confirm central monitoring has no open P0/P1 alerts.'
        required: true
        default: 'no'
      confirm_backup_ready:
        description: 'Type yes if backup is current, or n/a if this release does not touch data.'
        required: true
        default: 'n/a'
      emergency_override:
        description: 'Optional audit flag for urgent deploys; validation confirmations still apply.'
        required: false
        default: 'false'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # Force third-party JS actions onto Node 24 before the June 2026 cutoff.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: FTP upload
    # Production deploys use the trusted, isolated self-hosted deploy lane.
    runs-on: [self-hosted, ci-runner-node, deploy-only]
    environment: production
    steps:
      - name: Resolve release context
        id: release
        env:
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          release_sha="$INPUT_RELEASE_SHA"
          if [ "${#release_sha}" -ne 40 ] || ! printf '%s' "$release_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_sha must be a 40-character commit SHA."
            exit 1
          fi
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

      - name: Validate production release gates
        run: |
          set -euo pipefail
          release_sha="${{ steps.release.outputs.release_sha }}"
          if [ "${#release_sha}" -ne 40 ] || ! printf '%s' "$release_sha" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::release_sha must be the exact 40-character production commit SHA."
            exit 1
          fi
          if [ "${{ inputs.confirm_release_green }}" != "yes" ]; then
            echo "::error::confirm_release_green=yes is required."
            exit 1
          fi
          if [ "${{ inputs.confirm_no_p0_p1_alerts }}" != "yes" ]; then
            echo "::error::confirm_no_p0_p1_alerts=yes is required."
            exit 1
          fi
          case "${{ inputs.confirm_backup_ready }}" in
            yes|n/a) ;;
            *) echo "::error::confirm_backup_ready must be yes or n/a."; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.release_sha }}
          fetch-depth: 0

      - name: Verify release SHA is on main
        env:
          RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$RELEASE_SHA" || { echo "::error::Checked out $actual, expected $RELEASE_SHA"; exit 1; }
          git fetch --no-tags origin main
          git show-ref --verify --quiet refs/remotes/origin/main || { echo "::error::origin/main was not fetched."; exit 1; }
          git merge-base --is-ancestor "$RELEASE_SHA" refs/remotes/origin/main || {
            echo "::error::release_sha is not contained in origin/main."
            exit 1
          }

      - name: Install Bun and run tests
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Run release tests
        run: bun test --coverage

      - name: Sanitize FTP host
        id: host
        env:
          RAW_HOST: ${{ secrets.FTP_HOST }}
        run: |
          set -e
          if [ -z "$RAW_HOST" ]; then
            echo "::error::FTP_HOST secret is empty. Set it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          # Strip whitespace/newlines/CR, any scheme (ftp://, ftps://, sftp://), and any trailing path.
          CLEAN=$(printf '%s' "$RAW_HOST" | tr -d '[:space:]\r' | sed -E 's#^[a-zA-Z]+://##' | sed 's#/.*##')
          echo "::add-mask::$CLEAN"
          echo "host=$CLEAN" >> "$GITHUB_OUTPUT"
          if [ "$CLEAN" != "$RAW_HOST" ]; then
            echo "::warning::FTP_HOST had extra characters (whitespace, scheme, or path). Sanitized before use."
          fi

      - name: Pre-flight check (hostname/IP resolves)
        env:
          HOST: ${{ steps.host.outputs.host }}
        run: |
          python3 - <<'PY'
          import os, socket, sys
          host = os.environ.get('HOST', '')
          if not host:
              print('::error::Sanitized FTP host is empty.', file=sys.stderr)
              sys.exit(1)
          try:
              ip = socket.gethostbyname(host)
              print('DNS/IP OK')
          except Exception as e:
              print(f'::error::FTP host could not be resolved. Check hPanel > Files > FTP Accounts. Error: {type(e).__name__}', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Guard against Zyrosite / missing local assets
        run: |
          set -euo pipefail
          # Regression for 2026-07-13: partners marquee, skills tech-strip, and
          # about portrait all 404'd when assets.zyrosite.com died. Refuse to
          # ship HTML that still hotlinks that CDN or references missing files.
          python3 scripts/check-asset-integrity.py
          if grep -R -n 'assets\.zyrosite\.com' --include='*.html' --include='.htaccess' .; then
            echo "::error::Zyrosite hotlink still present after integrity script."
            exit 1
          fi

      - name: Cache-bust asset URLs
        env:
          SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -e
          # Append the commit SHA as a version query to the stylesheet and
          # extracted-i18n script so Cloudflare, Hostinger, and browsers all
          # see a new URL on every deploy. Without this the 7-day text/css
          # Expires header can pin an old stylesheet at the CF edge while the
          # HTML has already changed, producing unstyled markup on the live
          # site. The edit is applied to the working tree only, never
          # committed back to the repo.
          V="${SHA:0:7}"
          sed -i -E "s#href=\"assets/styles\.css\"#href=\"assets/styles.css?v=${V}\"#g" index.html
          sed -i -E "s#src=\"assets/i18n\.js\"#src=\"assets/i18n.js?v=${V}\"#g" index.html
          # Extracted JS modules under assets/js/ (email validation, consent,
          # cookie banner, i18n helpers, welcome modal) need the same
          # cache-busting as styles.css/i18n.js above.
          for f in consent i18n-utils welcome-modal email-validation cookie-banner; do
            sed -i -E "s#src=\"assets/js/${f}\.js\"#src=\"assets/js/${f}.js?v=${V}\"#g" index.html
          done
          echo "Asset version: ${V}"
          grep -E "assets/(styles\.css|i18n\.js)" index.html || (echo "::error::cache-bust rewrite missed expected references" && exit 1)
          grep -cE "assets/js/[a-z0-9-]+\.js\?v=${V}" index.html | grep -q '^5$' || (echo "::error::cache-bust rewrite missed one of the assets/js/*.js references" && exit 1)

      - name: Inject production tokens (optional, skip silently if secret missing)
        env:
          UMAMI_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          CF_BEACON: ${{ secrets.CF_BEACON_TOKEN }}
          POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
          RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          set -e
          # Replace the YOUR_* placeholders at deploy time so the committed
          # HTML stays free of real tokens. Each substitution runs only when
          # the corresponding secret is configured in the repo, so partial
          # setups do not fail the build.
          INJECTED=""
          if [ -n "$UMAMI_ID" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_UMAMI_WEBSITE_ID', os.environ['UMAMI_ID']))"
            INJECTED="$INJECTED UMAMI_WEBSITE_ID"
          fi
          if [ -n "$CF_BEACON" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_CF_BEACON_TOKEN', os.environ['CF_BEACON']))"
            INJECTED="$INJECTED CF_BEACON_TOKEN"
          fi
          if [ -n "$POSTHOG_KEY" ]; then
            python3 -c "import os,pathlib; f=pathlib.Path('index.html'); f.write_text(f.read_text().replace('YOUR_POSTHOG_KEY', os.environ['POSTHOG_KEY']))"
            INJECTED="$INJECTED PUBLIC_POSTHOG_KEY"
          fi
          # Contact delivery secrets stay server-side in api/secrets.php (never HTML).
          if [ -n "$RESEND_API_KEY" ] || [ -n "$SMTP_HOST" ]; then
            python3 scripts/write-contact-secrets.py
            INJECTED="$INJECTED RESEND_OR_SMTP"
          fi
          if [ -z "$INJECTED" ]; then
            echo "No optional tokens configured. Landing will keep placeholders; contact returns 503 until RESEND_* secrets are set."
          else
            echo "Injected:$INJECTED"
          fi

      - name: Assert contact Resend secrets are live
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail
          # Contact posts to /api/contact.php. Secrets must never appear in HTML.
          if grep -qiE 'web3forms|YOUR_WEB3FORMS|name="access_key"' index.html; then
            echo "::error::index.html still references Web3Forms / access_key. Migrate leftovers before deploy."
            exit 1
          fi
          if ! grep -q "/api/contact.php" index.html; then
            echo "::error::index.html does not reference /api/contact.php."
            exit 1
          fi
          if [ ! -f api/contact.php ]; then
            echo "::error::api/contact.php missing from deploy tree."
            exit 1
          fi
          if [ -n "${RESEND_API_KEY:-}" ]; then
            if [ ! -f api/secrets.php ]; then
              echo "::error::RESEND_API_KEY is set but api/secrets.php was not generated."
              exit 1
            fi
            if ! grep -q 'RESEND_API_KEY' api/secrets.php; then
              echo "::error::api/secrets.php does not contain RESEND_API_KEY."
              exit 1
            fi
            echo "Contact Resend secrets injected into api/secrets.php."
          else
            echo "::warning::RESEND_API_KEY is not configured. Contact form will return 503 until Resend secrets are set (SMTP-only is last-resort fallback)."
          fi

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.host.outputs.host }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger FTP users are chrooted to public_html/, so upload at the
          # account root. FTP_REMOTE_DIR is ignored on purpose to avoid double-
          # nesting (previous runs landed files at public_html/public_html/).
          server-dir: ./
          protocol: ftps
          port: 21
          timeout: 60000
          log-level: standard
          # Everything uploads EXCEPT these (dev-only, private, or repo metadata):
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.remember/**
            **/.playwright-mcp/**
            **/.idea/**
            **/.vscode/**
            **/node_modules/**
            **/scripts/**
            **/docs/**
            **/tests/**
            **/coverage/**
            **/.env
            **/.env.example
            **/.env.local
            **/.gitignore
            **/.DS_Store
            **/package.json
            **/package-lock.json
            **/bun.lockb
            **/bun.lock
            **/bunfig.toml
            **/README.md
            **/CLAUDE.md
            **/HANDOFF.md
            **/og.html
            **/verify-*.png
            **/*.log
            **/api/secrets.example.php

      - name: Post-deploy smoke test
        env:
          SHA: ${{ steps.release.outputs.release_sha }}
        run: |
          set -e
          # Cloudflare Bot Fight Mode challenges HTML and XML endpoints
          # when the request comes from a GitHub Actions runner. The
          # challenge uses TLS fingerprinting (JA3/JA4), which curl cannot
          # spoof regardless of User-Agent or Accept headers, so asking
          # curl to fetch / or /sitemap.xml reliably returns 403 in CI even
          # though the real site is fine for browsers.
          #
          # Workaround: probe cache-busted HTML when the edge allows it, then
          # always probe static assets that Cloudflare does not challenge
          # (text files, versioned CSS and JS, images, fonts). Failing the
          # asset checks still catches: missing FTP upload, wrong server-dir
          # nesting, Hostinger origin outage, and CDN that forgot to serve a
          # fresh file.
          V="${SHA:0:7}"
          HTML_CODE=$(curl -sL -o /tmp/jsm-index.html -w '%{http_code}' \
            -A "Mozilla/5.0 (compatible; JSMSmokeTest/1.0; +https://jorgesalgadomiranda.com)" \
            "https://jorgesalgadomiranda.com/?v=${V}" || true)
          if [ "$HTML_CODE" = "200" ]; then
            grep -q "assets/styles.css?v=${V}" /tmp/jsm-index.html || {
              echo "::error::Cache-busted HTML does not reference assets/styles.css?v=${V}."
              exit 1
            }
            if grep -q "capmenu.app" /tmp/jsm-index.html; then
              echo "::error::Cache-busted HTML still contains retired capmenu.app."
              exit 1
            fi
            echo "OK   /?v=${V} -> 200 and HTML content matches release ${V}"
          else
            echo "::warning::Cache-busted HTML returned $HTML_CODE from CI; continuing with asset smoke because Cloudflare may challenge runner HTML requests."
          fi
          if [ "$HTML_CODE" = "200" ]; then
            if grep -q 'assets\.zyrosite\.com' /tmp/jsm-index.html; then
              echo "::error::Live HTML still hotlinks assets.zyrosite.com."
              exit 1
            fi
            grep -q 'assets/images/foto_perfil.png' /tmp/jsm-index.html || {
              echo "::error::Live HTML missing self-hosted portrait path."
              exit 1
            }
          fi
          URLS=(
            "/robots.txt"
            "/humans.txt"
            "/og.png"
            "/assets/styles.css?v=${V}"
            "/assets/i18n.js?v=${V}"
            "/assets/js/consent.js?v=${V}"
            "/assets/js/i18n-utils.js?v=${V}"
            "/assets/js/welcome-modal.js?v=${V}"
            "/assets/js/email-validation.js?v=${V}"
            "/assets/js/cookie-banner.js?v=${V}"
            "/assets/logos/kotlin.svg"
            "/assets/logos/flutter.svg"
            "/assets/logos/jetpack-compose.svg"
            "/assets/brands/paypal.svg"
            "/assets/brands/capdesis.webp"
            "/assets/images/foto_perfil.png"
            "/fonts/geist.woff2"
            "/assets/cv/Jorge_Salgado_Miranda_CV_EN.pdf"
          )
          FAILED=0
          for url in "${URLS[@]}"; do
            CODE=""
            for attempt in 1 2 3; do
              CODE=$(curl -sL -o /dev/null -w '%{http_code}' \
                -A "Mozilla/5.0 (compatible; JSMSmokeTest/1.0; +https://jorgesalgadomiranda.com)" \
                "https://jorgesalgadomiranda.com${url}")
              if [ "$CODE" = "200" ]; then
                echo "OK   $url -> $CODE"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "WARN $url -> $CODE on attempt $attempt, retrying in 5s"
                sleep 5
              fi
            done
            if [ "$CODE" != "200" ]; then
              echo "::error::$url returned $CODE after 3 attempts"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::Smoke test failed on $FAILED of ${#URLS[@]} URLs"
            exit 1
          fi
          echo "Smoke test: all ${#URLS[@]} URLs returned 200."
          echo "Note: HTML endpoints skipped because CF Bot Fight Mode returns 403 to runner IPs regardless of User-Agent."
